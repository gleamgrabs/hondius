name: news-refresh

on:
  schedule:
    # Every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "ingest"
        type: choice
        options:
          - ingest
          - dry-run

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run RSS parser
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://hondius-watch.com' }}
        run: |
          MODE="${{ github.event.inputs.mode || 'ingest' }}"
          if [ "$MODE" = "dry-run" ]; then
            node scripts/refresh-news.mjs --dry-run
          else
            node scripts/refresh-news.mjs --ingest
          fi
