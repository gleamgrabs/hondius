services:
  hondius-tracker:
    container_name: hondius-tracker
    build: .
    image: hondius-tracker:latest
    restart: unless-stopped
    # NOT exposed on host — only reachable from cloudflared sidecar via the
    # internal docker network. Zero conflict with whale_nginx on host 80/443.
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      DATABASE_PATH: /app/data/subscribers.db
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      BROADCAST_ADMIN_TOKEN: ${BROADCAST_ADMIN_TOKEN}
      INGEST_TOKEN: ${INGEST_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
      # MV_HONDIUS_MMSI also needed here, чтобы /api/outbreaks/{slug}/ship-position
      # знал какой MMSI запрашивать из ship_positions.
      MV_HONDIUS_MMSI: ${MV_HONDIUS_MMSI:-}
      # Claude Haiku key for /api/internal/ingest LLM normalization and
      # scripts/normalize-existing.mjs CLI. Optional — fallback to raw if unset.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - hondius_data:/app/data
    networks:
      - hondius
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cloudflared:
    container_name: hondius-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - hondius-tracker
    networks:
      - hondius
    # No published ports — cloudflared establishes outbound connections to
    # Cloudflare edge, no inbound port needed on this server.

  ais-poll:
    container_name: hondius-ais-poll
    build:
      context: .
      dockerfile: Dockerfile.ais
    image: hondius-ais-poll:latest
    restart: unless-stopped
    profiles:
      # Сервис стартует ТОЛЬКО если запущен с профилем `ais`.
      # `docker compose --profile ais up -d` запустит этот сервис вместе с остальными.
      # Без профиля — сервис не создаётся → safety, пока оператор не получил AIS_API_KEY.
      - ais
    environment:
      AIS_API_KEY: ${AIS_API_KEY:-}
      MV_HONDIUS_MMSI: ${MV_HONDIUS_MMSI:-}
      DATABASE_PATH: /app/data/subscribers.db
    volumes:
      - hondius_data:/app/data
    networks:
      - hondius

networks:
  hondius:
    name: hondius
    driver: bridge

volumes:
  hondius_data:
    driver: local
