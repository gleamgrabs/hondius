services:
  hondius-tracker:
    container_name: hondius-tracker
    build: .
    image: hondius-tracker:latest
    restart: unless-stopped
    # Bind only to localhost on the host — nginx proxies in front
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      DATABASE_PATH: /app/data/subscribers.db
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      BROADCAST_ADMIN_TOKEN: ${BROADCAST_ADMIN_TOKEN}
    volumes:
      - hondius_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  hondius_data:
    driver: local
