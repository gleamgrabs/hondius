# /etc/nginx/sites-available/hondius
# Symlink:  sudo ln -s /etc/nginx/sites-available/hondius /etc/nginx/sites-enabled/
# After certbot --nginx the SSL block is auto-injected; on first install
# certbot will auto-update server_name and add the listen 443 block.

# ─── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hondius-watch.com www.hondius-watch.com;

    # Let's Encrypt validation lives at /.well-known/acme-challenge/
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS app ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hondius-watch.com www.hondius-watch.com;

    # SSL cert paths — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/hondius-watch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hondius-watch.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Gzip
    gzip on;
    gzip_types text/css text/plain application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Body size — tiny app, but allow some headroom
    client_max_body_size 1m;

    # Optional: rate-limit subscribe endpoint to avoid abuse
    # (define limit_req_zone in /etc/nginx/nginx.conf — see runbook)
    location = /api/subscribe {
        limit_req zone=subscribe_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other traffic → Next.js container on port 3002
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
